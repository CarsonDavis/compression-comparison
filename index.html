<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Image Compression Comparison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #eee; padding: 20px; }
  h1 { margin-bottom: 8px; }
  .subtitle { color: #999; margin-bottom: 20px; }

  /* Summary table */
  .summary { border-collapse: collapse; margin-bottom: 30px; }
  .summary th, .summary td { padding: 8px 16px; text-align: right; border: 1px solid #444; }
  .summary th { background: #222; text-align: left; }
  .summary .savings { color: #4caf50; }

  /* Image grid */
  .image-row { margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; }
  .image-row h3 { margin-bottom: 4px; font-size: 14px; color: #aaa; }
  .image-row .original-path { font-size: 12px; color: #666; margin-bottom: 10px; }
  .variants { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .variant { text-align: center; }
  .variant img { max-width: 100%; height: auto; max-height: 300px; object-fit: contain; border: 1px solid #333; background: #1a1a1a; cursor: pointer; }
  .variant .label { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
  .variant .size { font-size: 12px; color: #999; }
  .variant .savings { font-size: 11px; color: #4caf50; }

  /* Filters */
  .controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
  .controls select, .controls input { background: #222; color: #eee; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; }
</style>
</head>
<body>

<h1>Image Compression Comparison</h1>
<p class="subtitle">WebP conversion at q60 / q70 / q80 — click any image to open full size</p>

<div class="controls">
  <label>Filter: <select id="filter">
    <option value="all">All images</option>
    <option value="jpg">JPG only</option>
    <option value="png">PNG only</option>
  </select></label>
  <label>Sort: <select id="sort">
    <option value="name">By name</option>
    <option value="size-desc">By size (largest first)</option>
    <option value="savings">By savings % (best first)</option>
  </select></label>
</div>

  <thead>
    <tr><th>Variant</th><th>Total Size</th><th>Savings vs Original</th></tr>
  </thead>
  <tbody id="summary-body"></tbody>
</table>

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function pctSavings(orig, compressed) {
  return ((1 - compressed / orig) * 100).toFixed(1);
}

function renderSummary(data) {
  const tbody = document.getElementById('summary-body');
  const totals = { original: 0, q60: 0, q70: 0, q80: 0 };
  data.forEach(d => {
    totals.original += d.originalSize;
    totals.q60 += d.q60Size;
    totals.q70 += d.q70Size;
    totals.q80 += d.q80Size;
  });

  const rows = [
    ['Original', totals.original, '—'],
    ['WebP q60', totals.q60, pctSavings(totals.original, totals.q60) + '%'],
    ['WebP q70', totals.q70, pctSavings(totals.original, totals.q70) + '%'],
    ['WebP q80', totals.q80, pctSavings(totals.original, totals.q80) + '%'],
  ];

  tbody.innerHTML = rows.map(([name, size, savings]) =>
    `<tr><td>${name}</td><td>${formatBytes(size)}</td><td class="savings">${savings}</td></tr>`
  ).join('');
}

function renderImages(data) {
  const container = document.getElementById('images');
  container.innerHTML = data.map(d => {
    const origPath = d.originalPath.replace(/--/g, '/');
    return `
    <div class="image-row" data-ext="${d.ext}">
      <h3>${d.stem}</h3>
      <div class="original-path">public/images/${origPath}</div>
      <div class="variants">
        <div class="variant">
          <div class="label">Original (${d.ext.toUpperCase()})</div>
          <a href="${d.originalFile}" target="_blank"><img src="${d.originalFile}" loading="lazy"></a>
          <div class="size">${formatBytes(d.originalSize)}</div>
        </div>
        <div class="variant">
          <div class="label">WebP q60</div>
          <a href="${d.q60File}" target="_blank"><img src="${d.q60File}" loading="lazy"></a>
          <div class="size">${formatBytes(d.q60Size)}</div>
          <div class="savings">-${pctSavings(d.originalSize, d.q60Size)}%</div>
        </div>
        <div class="variant">
          <div class="label">WebP q70</div>
          <a href="${d.q70File}" target="_blank"><img src="${d.q70File}" loading="lazy"></a>
          <div class="size">${formatBytes(d.q70Size)}</div>
          <div class="savings">-${pctSavings(d.originalSize, d.q70Size)}%</div>
        </div>
        <div class="variant">
          <div class="label">WebP q80</div>
          <a href="${d.q80File}" target="_blank"><img src="${d.q80File}" loading="lazy"></a>
          <div class="size">${formatBytes(d.q80Size)}</div>
          <div class="savings">-${pctSavings(d.originalSize, d.q80Size)}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function applyFilters() {
  const filter = document.getElementById('filter').value;
  const sort = document.getElementById('sort').value;

  let data = [...IMAGE_DATA];
  if (filter !== 'all') data = data.filter(d => d.ext === filter);

  if (sort === 'size-desc') data.sort((a, b) => b.originalSize - a.originalSize);
  else if (sort === 'savings') data.sort((a, b) => (a.q60Size / a.originalSize) - (b.q60Size / b.originalSize));
  else data.sort((a, b) => a.stem.localeCompare(b.stem));

  renderSummary(data);
  renderImages(data);
}

document.getElementById('filter').addEventListener('change', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);

applyFilters();
</script>

</html>
